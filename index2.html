<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Favoritos</title>
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
<link rel="manifest" href="site.webmanifest">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Favoritos">
<meta name="theme-color" content="#1b1b1d">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --accent: #0a84ff;
  --bg: #1b1b1d;
  --text: #ffffff;
  --text2: #98989d;
  --tile-bg: rgba(255,255,255,0.14);
  --menu-bg: rgba(44,44,46,0.97);
  --menu-hover: rgba(255,255,255,0.08);
  --sep: rgba(255,255,255,0.12);
  --modal-bg: #2c2c2e;
  --input-bg: #1c1c1e;
  --input-border: #3a3a3c;
  --search-bg: rgba(118,118,128,0.24);
  --btn-bg: rgba(118,118,128,0.24);
  --danger: #ff453a;
  --radius: 16px;
  --icon: 76px;
  --font: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
}
@media (prefers-color-scheme: light) {
  :root {
    --accent: #007aff;
    --bg: #f2f2f7;
    --text: #1c1c1e;
    --text2: #6e6e73;
    --tile-bg: rgba(120,120,128,0.16);
    --menu-bg: rgba(250,250,252,0.97);
    --menu-hover: rgba(120,120,128,0.12);
    --sep: rgba(60,60,67,0.12);
    --modal-bg: #ffffff;
    --input-bg: #f2f2f7;
    --input-border: #e0e0e0;
    --search-bg: rgba(118,118,128,0.12);
    --btn-bg: rgba(118,118,128,0.12);
    --danger: #d70015;
  }
}
/* Tema manual: o atributo vence a media query (maior especificidade) */
:root[data-theme="dark"] {
  --accent: #0a84ff;
  --bg: #1b1b1d;
  --text: #ffffff;
  --text2: #98989d;
  --tile-bg: rgba(255,255,255,0.14);
  --menu-bg: rgba(44,44,46,0.97);
  --menu-hover: rgba(255,255,255,0.08);
  --sep: rgba(255,255,255,0.12);
  --modal-bg: #2c2c2e;
  --input-bg: #1c1c1e;
  --input-border: #3a3a3c;
  --search-bg: rgba(118,118,128,0.24);
  --btn-bg: rgba(118,118,128,0.24);
  --danger: #ff453a;
}
:root[data-theme="light"] {
  --accent: #007aff;
  --bg: #f2f2f7;
  --text: #1c1c1e;
  --text2: #6e6e73;
  --tile-bg: rgba(120,120,128,0.16);
  --menu-bg: rgba(250,250,252,0.97);
  --menu-hover: rgba(120,120,128,0.12);
  --sep: rgba(60,60,67,0.12);
  --modal-bg: #ffffff;
  --input-bg: #f2f2f7;
  --input-border: #e0e0e0;
  --search-bg: rgba(118,118,128,0.12);
  --btn-bg: rgba(118,118,128,0.12);
  --danger: #d70015;
}
html, body { overscroll-behavior-y: none; }
body {
  font-family: var(--font);
  background: var(--bg);
  min-height: 100vh;
  padding-bottom: 48px;
  color: var(--text);
}

/* ── Menu de contexto ── */
.ctx-menu {
  position: fixed; z-index: 400; width: max-content; max-width: calc(100vw - 16px);
  background: var(--menu-bg); backdrop-filter: blur(20px);
  border-radius: 12px; padding: 3px 0;
  box-shadow: 0 10px 40px rgba(0,0,0,0.35), 0 0 0 0.5px var(--sep);
  font-size: 13.5px; color: var(--text);
  animation: ctxIn 0.12s ease-out;
}
@keyframes ctxIn { from { opacity: 0; transform: scale(0.96); } to { opacity: 1; transform: scale(1); } }
.ctx-item {
  display: flex; align-items: center; gap: 10px;
  padding: 7px 14px; cursor: pointer; user-select: none; white-space: nowrap;
}
.ctx-item:hover { background: var(--menu-hover); }
.ctx-item.danger { color: var(--danger); }
.ctx-icon { width: 18px; text-align: center; flex-shrink: 0; font-size: 14px; }
.ctx-sep { height: 1px; background: var(--sep); margin: 3px 0; }
.ctx-head { display: flex; justify-content: space-between; align-items: center; gap: 16px; padding: 4px 6px 0 12px; }
.ctx-title { font-size: 13px; font-weight: 700; opacity: 0.85; white-space: nowrap; }

/* ── Renomear página (✏️ ao lado do título) ── */
.rename-page-btn {
  background: none; border: none; cursor: pointer;
  font-size: 15px; padding: 2px 4px; opacity: 0.55; line-height: 1;
}
.rename-page-btn:hover { opacity: 1; }

/* ── Modo Selecionar ── */
.sel-badge {
  position: absolute; top: -6px; left: -6px;
  width: 21px; height: 21px; border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.9);
  background: var(--btn-bg); color: transparent;
  font-size: 13px; font-weight: 700; line-height: 17px; text-align: center;
  z-index: 10; box-shadow: 0 1px 4px rgba(0,0,0,0.25);
}
.tile.sel-on .sel-badge { background: #0a84ff; color: #fff; }
.tile.sel-on { outline: 2px solid #0a84ff; outline-offset: 2px; border-radius: 14px; }
.sel-bar {
  position: fixed; bottom: 14px; left: 50%; transform: translateX(-50%);
  z-index: 300; display: flex; align-items: center; gap: 8px;
  background: var(--menu-bg); backdrop-filter: blur(20px);
  border-radius: 14px; padding: 8px 12px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.35), 0 0 0 0.5px var(--sep);
  font-size: 13.5px; color: var(--text); white-space: nowrap;
}
.sel-bar button {
  border: none; border-radius: 9px; padding: 7px 12px;
  background: var(--btn-bg); color: var(--text);
  font-size: 13.5px; font-weight: 600; cursor: pointer;
}
.sel-bar button.danger { color: var(--danger); }
.ctx-close {
  width: 22px; height: 22px; border-radius: 50%; border: none;
  background: var(--btn-bg); color: var(--text);
  font-size: 11px; font-weight: 700; cursor: pointer; line-height: 1;
}
.ctx-close:hover { filter: brightness(1.2); }
.ctx-menu { max-height: calc(100vh - 24px); overflow-y: auto; }
.ctx-preview {
  display: grid; grid-template-columns: repeat(4, 54px);
  gap: 9px 8px; padding: 10px 12px 8px;
}
.cp-cell { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.cp-cell img, .cp-emoji, .cp-fb {
  width: 38px; height: 38px; border-radius: 9px;
  object-fit: contain; background: var(--tile-bg); padding: 4px;
}
.cp-emoji { display: flex; align-items: center; justify-content: center; font-size: 22px; padding: 0; }
.cp-fb {
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-weight: 700; padding: 0;
  background: linear-gradient(135deg, #5B67CA, #9B59B6);
}
.cp-cell span {
  font-size: 9.5px; color: var(--text); text-align: center; max-width: 54px;
  overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2;
  -webkit-box-orient: vertical; line-height: 1.2;
}

/* ── Header ── */
.header {
  display: flex; align-items: center; justify-content: space-between;
  max-width: 680px; margin: 0 auto;
  padding: 24px 20px 4px;
}
.header-left { display: flex; align-items: center; gap: 10px; min-width: 0; }
h1.page-title { font-size: 27px; font-weight: 800; letter-spacing: -0.4px; }
.back-btn {
  background: none; border: none; color: var(--accent);
  font-size: 16px; cursor: pointer; padding: 4px 0;
  font-family: var(--font); display: flex; align-items: center; gap: 2px;
  white-space: nowrap;
}
.folder-title { font-size: 18px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.edit-btn {
  font-family: var(--font); font-size: 14px; font-weight: 600;
  padding: 6px 16px; border-radius: 20px; border: none; cursor: pointer;
  background: var(--btn-bg); color: var(--accent);
  transition: all 0.2s; white-space: nowrap;
}
.edit-btn.active { background: var(--accent); color: #fff; }

/* ── Grid ── */
.grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 18px 10px;
  max-width: 680px; margin: 16px auto 0; padding: 0 16px;
}
@media (max-width: 400px) { .grid { gap: 14px 6px; } }
@media (min-width: 681px) { .grid { grid-template-columns: repeat(5, 1fr); } }

/* ── Tile ── */
.tile {
  display: flex; flex-direction: column; align-items: center;
  padding: 4px 2px; border-radius: var(--radius);
  background: none; border: none; box-shadow: none;
  cursor: pointer; position: relative; user-select: none;
  -webkit-user-select: none; -webkit-touch-callout: none;
  transition: transform 0.12s;
}
.tile img {
  pointer-events: none;                 /* trava: segurar+mover arrasta o tile (link), não a imagem */
  -webkit-user-drag: none; user-drag: none;
  -webkit-touch-callout: none;
}
.tile:hover:not(.edit-mode-tile) { transform: scale(1.05); }
.tile.dragging { opacity: 0.35; }
.drag-ghost {
  position: fixed; z-index: 500; pointer-events: none;
  opacity: 0.88; transform: scale(1.1); margin: 0;
}
.edit-mode-tile { animation: wiggle 0.5s ease-in-out infinite alternate; touch-action: none; }
@keyframes wiggle { 0% { transform: rotate(-1.2deg); } 100% { transform: rotate(1.2deg); } }
@media (prefers-reduced-motion: reduce) { .edit-mode-tile { animation: none; } }

/* ── Tile icon ── */
.tile-icon {
  width: var(--icon); height: var(--icon);
  display: flex; align-items: center; justify-content: center; margin-bottom: 8px;
}
.tile-favicon {
  width: var(--icon); height: var(--icon); border-radius: var(--radius);
  object-fit: contain; display: block;
  background: var(--tile-bg); padding: 8px;
}
.tile-fallback {
  width: var(--icon); height: var(--icon); border-radius: var(--radius);
  background: linear-gradient(135deg, #5B67CA, #9B59B6);
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 28px; font-weight: 700;
}

/* ── Folder preview (miniaturas estilo pasta do iOS) ── */
.folder-preview {
  width: var(--icon); height: var(--icon); display: grid; grid-template-columns: 1fr 1fr;
  gap: 5px; padding: 9px; background: var(--tile-bg); border-radius: var(--radius);
}
.folder-preview img { width: 100%; height: 100%; border-radius: 6px; object-fit: cover; background: rgba(255,255,255,0.9); }
.mini-fallback {
  width: 100%; height: 100%; border-radius: 6px;
  background: linear-gradient(135deg, #5B67CA, #9B59B6);
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 10px; font-weight: 700;
}
.mini-folder { width: 100%; height: 100%; font-size: 14px; display:flex; align-items:center; justify-content:center; }
.folder-empty { font-size: 36px; width: var(--icon); height: var(--icon); background: var(--tile-bg); border-radius: var(--radius); display:flex; align-items:center; justify-content:center; }

/* ── Label ── */
.tile-label {
  font-size: 13.5px; font-weight: 600; color: var(--text); text-align: center;
  max-width: 100%; overflow: hidden;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  line-height: 1.25; word-break: break-word;
}

/* ── Delete button ── */
.delete-btn {
  position: absolute; top: -7px; left: -7px;
  width: 21px; height: 21px; border-radius: 50%;
  background: #ff3b30; color: #fff; border: 2px solid rgba(255,255,255,0.9);
  font-size: 13px; font-weight: 700; cursor: pointer;
  display: none; align-items: center; justify-content: center; line-height: 1;
  z-index: 10; box-shadow: 0 1px 4px rgba(0,0,0,0.25);
}
.show-delete .delete-btn { display: flex; }

/* ── Add tile ── */
.add-tile {
  display: flex; flex-direction: column; align-items: center;
  padding: 4px 2px; cursor: pointer; gap: 7px; background: none; border: none;
}
.add-tile-icon {
  width: var(--icon); height: var(--icon); border-radius: var(--radius);
  border: 1.5px dashed var(--text2);
  display: flex; align-items: center; justify-content: center;
  font-size: 26px; color: var(--accent); line-height: 1;
}
.add-tile:hover .add-tile-icon { background: var(--tile-bg); }
.add-tile-label { font-size: 13px; color: var(--text2); }

/* ── Modal ── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.5);
  backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
  display: flex; align-items: center; justify-content: center; z-index: 200;
}
.modal-box {
  background: var(--modal-bg); border-radius: 18px; padding: 24px;
  width: min(340px, calc(100vw - 40px));
  box-shadow: 0 24px 70px rgba(0,0,0,0.4);
  max-height: 84vh; overflow-y: auto;
  overscroll-behavior: contain;                /* iOS: não propaga rolagem p/ página */
}
.modal-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; color: var(--text); }
.modal-input, .modal-select {
  width: 100%; padding: 11px 14px; border-radius: 10px;
  border: 1px solid var(--input-border); font-size: 15px; font-family: var(--font);
  outline: none; background: var(--input-bg); margin-bottom: 10px;
  color: var(--text); transition: border-color 0.15s;
  display: block; -webkit-appearance: none; appearance: none;
}
.modal-input:focus, .modal-select:focus { border-color: var(--accent); }
.modal-label { font-size: 12px; color: var(--text2); margin: 2px 0 4px 2px; }
.modal-actions { display: flex; gap: 8px; margin-top: 4px; }
.modal-cancel {
  flex: 1; padding: 11px; border-radius: 10px;
  border: 1px solid var(--input-border); background: var(--btn-bg); cursor: pointer;
  font-weight: 600; font-family: var(--font); font-size: 15px; color: var(--text);
}
.modal-confirm {
  flex: 1; padding: 11px; border-radius: 10px;
  border: none; background: var(--accent); color: #fff;
  cursor: pointer; font-weight: 600; font-family: var(--font); font-size: 15px;
}
.modal-cancel:hover { filter: brightness(1.15); }
.modal-confirm:hover { filter: brightness(0.92); }
.icon-row { display: flex; gap: 8px; align-items: stretch; margin-bottom: 10px; }
.icon-pull-btn {
  width: 46px; border-radius: 12px; flex-shrink: 0;
  border: 1.5px dashed var(--input-border); background: var(--input-bg);
  font-size: 20px; cursor: pointer; color: var(--accent);
}
.icon-pull-btn:hover { background: var(--tile-bg); }
.icon-row .modal-input { flex: 1; margin-bottom: 0; }

/* ── Search ── */
.search-bar { max-width: 680px; margin: 14px auto 0; padding: 0 16px; }
.search-input {
  width: 100%; padding: 10px 16px 10px 38px; border-radius: 12px;
  border: none; background: var(--search-bg);
  font-size: 15px; font-family: var(--font); color: var(--text);
  outline: none;
}
.search-input::placeholder { color: var(--text2); }
.search-wrap { position: relative; }
.search-icon {
  position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
  color: var(--text2); font-size: 15px; pointer-events: none;
}
.offline-banner {
  position: fixed; left: 50%; bottom: 18px; transform: translateX(-50%);
  z-index: 300; display: flex; align-items: center; gap: 10px;
  background: var(--menu-bg); color: var(--text);
  font-size: 13px; padding: 8px 12px; border-radius: 10px;
  box-shadow: 0 6px 24px rgba(0,0,0,0.3), 0 0 0 0.5px var(--sep);
  animation: ctxIn 0.15s ease-out;
}
.offline-banner button {
  border: none; background: none; color: var(--text2);
  cursor: pointer; font-size: 12px; padding: 2px;
}
.toast {
  position: fixed; left: 50%; bottom: 18px; transform: translateX(-50%);
  z-index: 600; display: flex; align-items: center; gap: 12px;
  background: var(--menu-bg); color: var(--text);
  font-size: 13px; padding: 9px 14px; border-radius: 10px;
  box-shadow: 0 6px 24px rgba(0,0,0,0.3), 0 0 0 0.5px var(--sep);
  animation: ctxIn 0.15s ease-out; max-width: calc(100vw - 32px);
}
.toast span { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.toast button {
  border: none; background: none; color: var(--accent);
  cursor: pointer; font-size: 13px; font-weight: 600;
  padding: 2px; font-family: var(--font); flex-shrink: 0;
}
.empty-folder {
  grid-column: 1 / -1; text-align: center;
  padding: 48px 20px; color: var(--text2); font-size: 15px;
}
.dup-group { margin-bottom: 14px; }
.dup-url {
  font-size: 13px; font-weight: 600; color: var(--accent);
  word-break: break-all; margin-bottom: 4px;
}
.dup-entry { font-size: 13px; color: var(--text); padding: 2px 0 2px 6px; }
.dup-entry span { color: var(--text2); }
.tile-count { font-size: 10.5px; color: var(--text2); margin-top: 1px; }
.top-used-title {
  max-width: 680px; margin: 14px auto 0; padding: 0 16px;
  font-size: 12px; font-weight: 600; color: var(--text2);
  text-transform: uppercase; letter-spacing: 0.4px;
}
.stat-row { display: flex; justify-content: space-between; gap: 12px; font-size: 13.5px; padding: 5px 0; }
.stat-row span:last-child { color: var(--text2); }

/* ── Visualização em Lista ── */
.grid.list-view { display: flex; flex-direction: column; gap: 2px; }
.list-view .tile { flex-direction: row; align-items: center; gap: 12px; padding: 7px 10px; }
.list-view .tile-icon { width: 34px; height: 34px; margin-bottom: 0; flex-shrink: 0; }
.list-view .tile-favicon, .list-view .tile-fallback, .list-view .folder-preview, .list-view .folder-empty {
  width: 34px; height: 34px; border-radius: 8px; padding: 3px; font-size: 15px;
}
.list-view .folder-preview { gap: 2px; padding: 4px; }
.list-view .folder-preview img, .list-view .mini-fallback { border-radius: 3px; }
.list-view .mini-fallback { font-size: 6px; }
.list-view .mini-folder { font-size: 8px; }
.list-view .folder-empty { font-size: 18px; }
.list-view .tile-label { text-align: left; -webkit-line-clamp: 1; }
.list-view .tile-count { margin-left: auto; margin-top: 0; flex-shrink: 0; }
.hint {
  max-width: 680px; margin: 10px auto 0; padding: 0 16px;
  font-size: 12px; color: var(--text2); text-align: center;
}

/* ── Exportar / Importar ── */
.io-bar {
  max-width: 680px; margin: 12px auto 0; padding: 0 16px;
  display: flex; gap: 8px;
}
.io-btn {
  flex: 1; padding: 9px; border-radius: 10px; cursor: pointer;
  font-family: var(--font); font-size: 13px; font-weight: 600;
  background: rgba(255,255,255,0.6); color: var(--accent);
  border: 1px solid rgba(52,120,246,0.35);
}
.io-btn:hover { background: rgba(52,120,246,0.08); }
.sync { font-size: 11px; color: var(--text2); white-space: nowrap; }
</style>
</head>

// ─── Sync GitHub ──────────────────────────────────────────────────────────────
// >>> EDITE ESTAS 2 LINHAS com seu usuário e repositório do GitHub <<<
const GH_OWNER  = 'brnesa';
const GH_REPO   = 'home';
const GH_FILE   = 'data.json';
const GH_BRANCH = 'main';
const TOKEN_KEY = 'gh-token';
let ghSha = null, pushTimer = null, syncState = 'off', syncMsg = '';

function ghOwner(){ return lsGet('gh-owner') || (GH_OWNER !== 'SEU-USUARIO' ? GH_OWNER : ''); }
function ghRepo(){ return lsGet('gh-repo') || (GH_REPO !== 'SEU-REPO' ? GH_REPO : ''); }
function ghConfigured(){ return !!(ghOwner() && ghRepo()); }
function askConfig(){
  const o = prompt('Usuário do GitHub (ex: almada123):', ghOwner());
  if (o && o.trim()) lsSet('gh-owner', o.trim());
  const r = prompt('Nome do repositório (ex: favoritos):', ghRepo());
  if (r && r.trim()) lsSet('gh-repo', r.trim());
  return ghConfigured();
}
function getToken(){ return lsGet(TOKEN_KEY) || ''; }
function setToken(t){
  lsSet(TOKEN_KEY, t);
  if (t) lsSet(TOKEN_KEY + '-date', String(Date.now()));   // início da validade (PAT ~1 ano)
  else   lsSet(TOKEN_KEY + '-date', '');
}
function askToken(){
  const t = prompt('Cole seu token do GitHub (fine-grained · Contents: Read and write):');
  if (t && t.trim()) setToken(t.trim());
  return getToken();
}
function b64encode(str){
  const bytes = new TextEncoder().encode(str);
  let bin = ''; bytes.forEach(b => bin += String.fromCharCode(b));
  return btoa(bin);
}
function b64decode(b64){
  const bin = atob(b64.replace(/\s/g, ''));
  return new TextDecoder().decode(Uint8Array.from(bin, c => c.charCodeAt(0)));
}
function syncText(){
  if (!ghConfigured()) return '';
  if (syncState === 'saving') return '⟳ salvando…';
  if (syncState === 'ok')     return '✓ sync';
  if (syncState === 'offline') return '⚠︎ offline (local)';
  if (syncState === 'error')  return '⚠︎ ' + (syncMsg || 'erro');
  return '';
}
function updateSyncUI(msg){
  syncMsg = msg || '';
  const el = document.getElementById('sync-badge');
  if (el) el.textContent = syncText();
}
async function ghLoad(){
  const res = await fetch(
    `https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${GH_FILE}?ref=${GH_BRANCH}`,
    { headers: { Accept: 'application/vnd.github+json' }, cache: 'no-store' }
  );
  if (res.status === 404) return null;                 // data.json ainda não existe
  if (!res.ok) throw new Error('HTTP ' + res.status);
  const j = await res.json();
  ghSha = j.sha;
  return JSON.parse(b64decode(j.content));
}
async function ghPush(retry = true){
  const token = getToken() || askToken();
  if (!token) { syncState = 'error'; updateSyncUI('sem token'); return; }
  syncState = 'saving'; updateSyncUI();
  try {
    const body = {
      message: 'Atualiza favoritos — ' + new Date().toISOString(),
      content: b64encode(JSON.stringify(items, null, 1)),
      branch: GH_BRANCH,
    };
    if (ghSha) body.sha = ghSha;
    const res = await fetch(
      `https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${GH_FILE}`,
      { method: 'PUT',
        headers: { Authorization: 'Bearer ' + token, Accept: 'application/vnd.github+json' },
        body: JSON.stringify(body) }
    );
    if (res.status === 409 && retry) { await ghLoad(); return ghPush(false); }  // conflito: repega sha e tenta 1x
    if (res.status === 401 || res.status === 403) { setToken(''); throw new Error('token inválido'); }
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const j = await res.json();
    ghSha = j.content.sha;
    syncState = 'ok'; updateSyncUI();
    lsSet('last-sync', String(Date.now()));
    showToast('Sincronizado ✓');
  } catch (e) {
    syncState = 'offline'; updateSyncUI();             // lista local já está na tela: nada trava
    showOfflineBanner();
  }
}
function showOfflineBanner(){
  if (document.getElementById('offline-banner')) return;
  const b = document.createElement('div');
  b.id = 'offline-banner'; b.className = 'offline-banner';
  b.innerHTML = '<span>⚠︎ Sync indisponível — usando dados locais</span><button aria-label="fechar">✕</button>';
  b.querySelector('button').addEventListener('click', () => b.remove());
  document.body.appendChild(b);
  setTimeout(() => b.remove(), 8000);                  // discreto: some sozinho
}
function schedulePush(){
  if (!ghConfigured()) return;
  clearTimeout(pushTimer);
  pushTimer = setTimeout(() => ghPush(), 3000);        // agrupa: envia 3s após a última alteração
}

let toastTimer = null;
function showToast(msg, opts = {}){          // opts: {actionLabel, onAction, duration}
  const cur = document.getElementById('app-toast');
  if (cur?.dataset.sticky === '1' && !opts.actionLabel) return;  // não cobre um "Desfazer" ativo
  cur?.remove(); clearTimeout(toastTimer);
  const t = document.createElement('div');
  t.id = 'app-toast'; t.className = 'toast';
  if (opts.actionLabel) t.dataset.sticky = '1';
  const s = document.createElement('span'); s.textContent = msg; t.appendChild(s);
  if (opts.actionLabel) {
    const b = document.createElement('button'); b.textContent = opts.actionLabel;
    b.addEventListener('click', () => { clearTimeout(toastTimer); t.remove(); opts.onAction?.(); });
    t.appendChild(b);
  }
  document.body.appendChild(t);
  toastTimer = setTimeout(() => t.remove(), opts.duration || 2000);
}

function currentFolder(){          // nó da pasta aberta (ou null = raiz)
  let node = null, list = items;
  for (const id of path) {
    node = list.find(i => i.id === id && i.type === 'folder');
    if (!node) return null;
    list = node.items || [];
  }
  return node;
}
function currentList(){ const f = currentFolder(); return f ? (f.items || []) : items; }
function setCurrentList(newList){
  if (!path.length) { items = newList; return; }
  const f = currentFolder(); if (f) f.items = newList;
}
function findParentList(id, list = items){   // lista que contém o item de id X
  for (const it of list) {
    if (it.id === id) return list;
    if (it.type === 'folder') {
      const r = findParentList(id, it.items || []);
      if (r) return r;
    }
  }
  return null;
}
function findItem(id, list = items){
  for (const it of list) {
    if (it.id === id) return it;
    if (it.type === 'folder') { const r = findItem(id, it.items || []); if (r) return r; }
  }
  return null;
}
function allFolders(list = items, prefix = ''){  // [{id, label}] p/ o seletor Mover
  const out = [];
  for (const it of list) {
    if (it.type === 'folder') {
      out.push({ id: it.id, label: prefix + (it.emoji ? it.emoji + ' ' : '') + it.name });
      out.push(...allFolders(it.items || [], prefix + '\u2003'));
    }
  }
  return out;
}
function isDescendant(folderId, maybeChildId){  // impede mover pasta p/ dentro dela mesma
  const f = findItem(folderId);
  if (!f || f.type !== 'folder') return false;
  return !!findItem(maybeChildId, f.items || []);
}
function moveItem(id, targetFolderId){          // targetFolderId '' = raiz
  const item = findItem(id); if (!item) return;
  if (item.type === 'folder' && (id === targetFolderId || isDescendant(id, targetFolderId))) return;
  const src = findParentList(id); if (!src) return;
  src.splice(src.findIndex(i => i.id === id), 1);
  const dest = targetFolderId ? (findItem(targetFolderId)?.items) : items;
  if (dest) dest.push(item); else items.push(item);
  saveData(); render();
}

// ─── Favicons: cadeia forçada + cache base64 ─────────────────────────────────
function normalizeUrl(u){
  u = (u || '').trim();
  if (!u) return u;
  if (!/^[a-zA-Z][a-zA-Z0-9+.-]*:\/\//.test(u)) u = 'https://' + u;
  return u;
}
function hostOf(url){ try { return new URL(url).hostname; } catch { return null; } }
function normTxt(s){ return (s || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, ''); }  // "Receíta" → "receita"
const SLD = new Set(['com.br','net.br','org.br','gov.br','edu.br','srv.br','art.br','blog.br','eco.br','ind.br','inf.br','jus.br','leg.br','mil.br','psi.br','rec.br','tur.br','tv.br','co.uk','org.uk','gov.uk','com.vc','com.ar','com.mx','com.pt','co.jp']);
function rootDomain(host){                     // mail.proton.me → proton.me · a.claro.com.br → claro.com.br
  if (!host) return null;
  const p = host.split('.');
  if (p.length <= 2) return host;
  const last2 = p.slice(-2).join('.');
  return SLD.has(last2) ? p.slice(-3).join('.') : last2;
}
function iconUrlToField(u){                    // campo mostra só o domínio quando é o template
  if (!u) return '';
  const m = u.match(/^https:\/\/www\.google\.com\/s2\/favicons\?[^\s]*domain=([^&\s]+)/);
  return m ? decodeURIComponent(m[1]) : u;
}
function iconFieldToUrl(v){                    // domínio digitado → template embutido
  v = (v || '').trim();
  if (!v) return '';
  if (/^(https?:|data:)/i.test(v)) return v;
  return 'https://www.google.com/s2/favicons?sz=64&domain=' + v.replace(/^\/+|\/+$/g, '');
}
function autoIconUrl(rawUrl){                  // link embutido: usuário nunca digita o template
  const h = hostOf(normalizeUrl(rawUrl));
  const root = rootDomain(h);
  return root ? 'https://www.google.com/s2/favicons?sz=64&domain=' + root : null;
}
function favSources(host){
  return [
    'https://www.google.com/s2/favicons?sz=64&domain=' + host,
    'https://icons.duckduckgo.com/ip3/' + host + '.ico',
  ];
}
function favSrc(url){
  const h = hostOf(url); if (!h) return null;
  return favCache[h] || favSources(h)[0];
}
function imgErr(img, mini){
  const h = img.dataset.host, stage = parseInt(img.dataset.stage || '0');
  const srcs = h ? favSources(h) : [];
  if (h && stage + 1 < srcs.length) {          // tenta próxima fonte
    img.dataset.stage = stage + 1;
    img.src = srcs[stage + 1];
    return;
  }
  const fb = document.createElement('div');    // fallback: letra
  fb.className = mini ? 'mini-fallback' : 'tile-fallback';
  fb.textContent = img.dataset.letter || '?';
  img.replaceWith(fb);
}
function tileImgErr(img){ imgErr(img, false); }
function miniImgErr(img){ imgErr(img, true); }

// Após carregar da rede, converte p/ base64 e persiste (offline nas próximas)
async function cacheFavicon(host, srcUrl){
  if (!host || favCache[host]) return;
  try {
    const res = await fetch(srcUrl, { mode: 'cors' });
    if (!res.ok) return;
    const blob = await res.blob();
    if (blob.size > 60000) return;             // evita estourar o storage
    const dataUrl = await new Promise((ok, err) => {
      const r = new FileReader();
      r.onload = () => ok(r.result); r.onerror = err;
      r.readAsDataURL(blob);
    });
    favCache[host] = dataUrl;
    saveFavCache();
  } catch { /* sem CORS: fica no cache HTTP do navegador */ }
}
function imgLoaded(img){
  const h = img.dataset.host;
  if (h && !favCache[h]) cacheFavicon(h, img.src);
}

// ─── Ordenação A→Z ────────────────────────────────────────────────────────────
function azCompare(a, b){
  const af = a.type === 'folder', bf = b.type === 'folder';
  if (af !== bf) return af ? -1 : 1;                     // pastas primeiro
  return a.name.localeCompare(b.name, 'pt-BR', { sensitivity: 'base' });
}
function sortListAZ(list, recursive){
  list.sort(azCompare);
  if (recursive) for (const it of list) if (it.type === 'folder') sortListAZ(it.items || [], true);
}
function doSortAZ(){
  if (!path.length) sortListAZ(items, true);             // raiz: pastas + conteúdo de cada pasta
  else { const l = currentList(); sortListAZ(l, false); setCurrentList(l); }
  saveData(); render();
}

// ─── Exportar / Importar HTML (formato Netscape — compatível com navegadores) ─
function escHtml(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function toNetscape(list, depth){
  const pad = '    '.repeat(depth);
  let out = '';
  for (const it of list) {
    if (it.type === 'folder') {
      out += `${pad}<DT><H3>${escHtml((it.emoji ? it.emoji + ' ' : '') + it.name)}</H3>\n`;
      out += `${pad}<DL><p>\n${toNetscape(it.items || [], depth + 1)}${pad}</DL><p>\n`;
    } else {
      out += `${pad}<DT><A HREF="${escHtml(it.url || '')}"${it.icon ? ` ICON_URI="${escHtml(it.icon)}"` : ''}>${escHtml(it.name)}</A>\n`;
    }
  }
  return out;
}
function exportHtml(){
  const html = '<!DOCTYPE NETSCAPE-Bookmark-file-1>\n' +
    '<META HTTP-EQUIV="Content-Type" CONTENT="text/html; charset=UTF-8">\n' +
    '<TITLE>Bookmarks</TITLE>\n<H1>Bookmarks</H1>\n<DL><p>\n' +
    toNetscape(items, 1) + '</DL><p>\n';
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([html], { type: 'text/html' }));
  a.download = new Date().toISOString().slice(0,10) + '-Favoritos' + '.html';
  document.body.appendChild(a); a.click(); a.remove();
  lsSet('last-backup', String(Date.now()));
  setTimeout(() => URL.revokeObjectURL(a.href), 2000);
}
function walkDL(dl){
  const out = [];
  let lastFolder = null;
  for (const el of dl.children) {
    if (el.tagName === 'DT') {
      const h3 = el.querySelector(':scope > h3');
      const a  = el.querySelector(':scope > a');
      if (h3) {
        lastFolder = { id: genId(), type: 'folder', name: h3.textContent.trim() || 'Pasta', items: [] };
        const inner = el.querySelector(':scope > dl');
        if (inner) lastFolder.items = walkDL(inner);
        out.push(lastFolder);
      } else if (a && a.getAttribute('href')) {
        const bm = { id: genId(), type: 'bookmark',
                     name: a.textContent.trim() || a.getAttribute('href'),
                     url: a.getAttribute('href') };
        const ic = a.getAttribute('icon_uri');
        if (ic && /^https?:/.test(ic)) bm.icon = ic;
        out.push(bm);
      }
    } else if (el.tagName === 'DL' && lastFolder && !lastFolder.items.length) {
      lastFolder.items = walkDL(el);           // navegadores às vezes soltam o DL como irmão do DT
    }
  }
  return out;
}
function importHtmlText(text){
  const doc = new DOMParser().parseFromString(text, 'text/html');
  const rootDL = doc.querySelector('dl');
  let parsed = rootDL ? walkDL(rootDL) : [];
  if (!parsed.length) {                        // fallback: qualquer <a href> do arquivo
    parsed = [...doc.querySelectorAll('a[href]')].map(a => ({
      id: genId(), type: 'bookmark',
      name: a.textContent.trim() || a.getAttribute('href'), url: a.getAttribute('href') }));
  }
  if (!parsed.length) { alert('Nenhum favorito encontrado no arquivo HTML.'); return; }
  const count = (function c(l){ return l.reduce((n,i)=> n + (i.type==='folder' ? c(i.items||[]) : 1), 0); })(parsed);
  if (!confirm(`Importar ${count} favorito(s)? Serão ADICIONADOS ao final da página inicial (nada é apagado).`)) return;
  items.push(...parsed);
  saveData(); render();
}

// ─── Menu de contexto (botão direito) ─────────────────────────────────────────
let ctxOpenedAt = 0;
function closeCtx(){ document.getElementById('ctx-menu')?.remove(); }
function openCtx(x, y, entries, opts = {}){     // opts: {title}

addEventListener('click',  () => { if (Date.now() - ctxOpenedAt > 350) closeCtx(); });

// Long-press (segurar o dedo) — iOS não dispara 'contextmenu' no toque
let lpTimer = null, lpFired = false, lpStart = null;
// Pointer Events: unifica mouse, toque e caneta numa API só
function initPointer(){
  const app = document.getElementById('app');
  let drag = null;                              // estado do arraste (modo Edit)

  let pendingDrag = null;                       // tile aguardando virar arraste (modo Edit)
  let lpMenu = null;                            // menu armado, abre no pointerup

  app.addEventListener('pointerdown', e => {
    if (e.button !== 0 && e.pointerType === 'mouse') return;   // só botão principal
    lpFired = false;
    pendingDrag = null;
    lpStart = { x: e.clientX, y: e.clientY, target: e.target };
    const tile = e.target.closest?.('.tile:not(.add-tile)');

    if ((editMode || sortMode) && tile && !e.target.closest('.delete-btn')) {
      // ── modo Edit: mover o dedo OU segurar 180ms inicia o arraste
      pendingDrag = tile;
      lpTimer = setTimeout(() => {
        if (pendingDrag) { startDrag(pendingDrag, lpStart.x, lpStart.y); pendingDrag = null; }
      }, 180);
      return;
    }
    // ── fora do Edit: segurar 450ms ARMA o menu (vibra); ele abre ao soltar
    lpTimer = setTimeout(() => {
      lpFired = true;
      try { navigator.vibrate?.(10); } catch {}
      if (tile) lpMenu = { tile, x: lpStart.x, y: lpStart.y };
      else if (!lpStart.target.closest('.ctx-menu,.modal-overlay,input,button,select'))
        lpMenu = { tile: null, x: lpStart.x, y: lpStart.y };
    }, 450);
  });

  app.addEventListener('touchmove', e => {
    if (drag || pendingDrag) e.preventDefault();   // Brave iOS: impede o roubo do gesto
  }, { passive: false });

  addEventListener('pointermove', e => {
    if (drag) { moveDrag(e); return; }
    if (pendingDrag) {                          // mexeu no modo Edit = já é arraste
      if (Math.hypot(e.clientX - lpStart.x, e.clientY - lpStart.y) > 6) {
        clearTimeout(lpTimer);
        startDrag(pendingDrag, e.clientX, e.clientY);
        pendingDrag = null;
      }
      return;
    }
    if (lpStart && Math.hypot(e.clientX - lpStart.x, e.clientY - lpStart.y) > 12) {
      clearTimeout(lpTimer);                    // mexeu = scroll, cancela long-press do menu
      lpMenu = null; lpFired = false;
    }
  });

  addEventListener('pointerup', e => {
    clearTimeout(lpTimer);
    pendingDrag = null;                         // soltou sem mover = clique normal (abre modal)
    if (drag) { endDrag(); return; }
    if (lpMenu) {                               // soltou com o menu armado: abre agora
      const m = lpMenu; lpMenu = null;
      if (m.tile) ctxForTile(m.x, m.y, m.tile);
      else ctxForBackground(m.x, m.y);
      e.preventDefault();
      return;
    }
    if (lpFired) e.preventDefault();            // bloqueia o clique fantasma pós menu
  });
  addEventListener('pointercancel', () => { clearTimeout(lpTimer); pendingDrag = null; lpMenu = null; if (drag) endDrag(true); });

  function startDrag(tile, x, y){
    lpFired = true;                             // suprime o clique que viria depois
    try { navigator.vibrate?.(10); } catch {}
    const r = tile.getBoundingClientRect();
    const ghost = tile.cloneNode(true);
    ghost.classList.add('drag-ghost');
    ghost.style.width = r.width + 'px';
    ghost.style.left = (x - r.width / 2) + 'px';
    ghost.style.top  = (y - r.height / 2) + 'px';
    document.body.appendChild(ghost);
    tile.classList.add('dragging');
    drag = { tile, ghost, w: r.width, h: r.height };
  }
  function moveDrag(e){
    e.preventDefault();
    drag.ghost.style.left = (e.clientX - drag.w / 2) + 'px';
    drag.ghost.style.top  = (e.clientY - drag.h / 2) + 'px';
    const under = document.elementFromPoint(e.clientX, e.clientY);
    const over = under?.closest?.('.tile:not(.add-tile):not(.drag-ghost)');
    if (!over || over === drag.tile) return;
    const grid = drag.tile.parentElement;
    if (over.parentElement !== grid) return;
    const kids = [...grid.children];
    // reordena o DOM ao vivo; o dado é gravado só no pointerup
    grid.insertBefore(drag.tile, kids.indexOf(over) > kids.indexOf(drag.tile) ? over.nextSibling : over);
  }
  function endDrag(cancelled){
    drag.ghost.remove();
    drag.tile.classList.remove('dragging');
    if (!cancelled) {
      const order = [...drag.tile.parentElement.querySelectorAll('.tile:not(.add-tile)')].map(t => t.dataset.id);
      const list = currentList();
      list.sort((a, b) => order.indexOf(a.id) - order.indexOf(b.id));
      setCurrentList(list); saveData();
    }
    drag = null;
    render();
  }
}

function ctxPreviewHtml(folder){                // miniatura do conteúdo, estilo iOS
  return (folder.items || []).slice(0, 8).map(sub => {
    const nm = escHtml(sub.name || '');
    const l = (sub.name || '?')[0].toUpperCase();
    let ic;
    if (sub.type === 'folder') ic = `<div class="cp-emoji">${sub.emoji || '📁'}</div>`;
    else if (sub.icon) ic = `<img src="${sub.icon.replace(/"/g,'&quot;')}" onerror="this.style.visibility='hidden'" alt="">`;
    else {
      const h = hostOf(sub.url);
      ic = h ? `<img src="${favSrc(sub.url)}" onerror="this.style.visibility='hidden'" alt="">`
             : `<div class="cp-fb">${l}</div>`;
    }
    return `<div class="cp-cell">${ic}<span>${nm}</span></div>`;
  }).join('');
}

function allBookmarkUrls(it){                   // urls de uma pasta (recursivo)
  if (it.type !== 'folder') return it.url ? [it.url] : [];
  return (it.items || []).flatMap(allBookmarkUrls);
}
function deleteItemById(id){
  const it = findItem(id); if (!it) return;
  const list = findParentList(id); if (!list) return;
  const idx = list.findIndex(i => i.id === id);
  list.splice(idx, 1); saveData(); render();   // remove já; Desfazer devolve no mesmo lugar
  const n = it.type === 'folder' ? allBookmarkUrls(it).length : 0;
  const msg = it.type === 'folder'
    ? `Pasta "${it.name}"${n ? ` (${n} links)` : ''} apagada`
    : `"${it.name}" apagado`;
  showToast(msg, { actionLabel: 'Desfazer', duration: 5000,
    onAction: () => { list.splice(Math.min(idx, list.length), 0, it); saveData(); render(); } });
}
// ─── Estatísticas ─────────────────────────────────────────────────────────────
function showStats(){
  let favs = 0, folders = 0, noIcon = 0;
  (function walk(list){
    for (const it of list) {
      if (it.type === 'folder') { folders++; walk(it.items || []); }
      else {
        favs++;
        const h = hostOf(it.url);
        if (!it.icon && (!h || !favCache[h])) noIcon++;  // sem ícone custom e sem cache
      }
    }
  })(items);
  const fmt = k => {
    const t = parseInt(lsGet(k) || '0');
    return t ? new Date(t).toLocaleString('pt-BR', { dateStyle: 'short', timeStyle: 'short' }) : '—';
  };
  document.getElementById('dup-overlay')?.remove();
  const ov = document.createElement('div');
  ov.id = 'dup-overlay'; ov.className = 'modal-overlay';
  ov.innerHTML = `<div class="modal-box">
    <div class="modal-title">📊 Estatísticas</div>
    <div class="stat-row"><span>Favoritos</span><span>${favs}</span></div>
    <div class="stat-row"><span>Pastas</span><span>${folders}</span></div>
    <div class="stat-row"><span>Sem favicon</span><span>${noIcon}</span></div>
    <div class="stat-row"><span>Último backup (export)</span><span>${fmt('last-backup')}</span></div>
    <div class="stat-row"><span>Última sincronização</span><span>${fmt('last-sync')}</span></div>
    <div class="modal-actions"><button class="modal-cancel" id="dup-close">Fechar</button></div>
  </div>`;
  ov.addEventListener('click', e => { if (e.target === ov || e.target.id === 'dup-close') ov.remove(); });
  document.body.appendChild(ov);
}

function duplicateItem(id){
  const it = findItem(id); const list = findParentList(id);
  if (!it || !list) return;
  const clone = JSON.parse(JSON.stringify(it));
  (function reId(node){ node.id = genId(); (node.items || []).forEach(reId); })(clone);  // ids novos em toda a árvore
  clone.name = it.name + ' (cópia)';
  const idx = list.findIndex(i => i.id === id);
  list.splice(idx + 1, 0, clone);                        // entra logo após o original
  saveData(); render();
  showToast('Duplicado');
}
function ctxForTile(x, y, tile){
  const it = findItem(tile.dataset.id); if (!it) return;
  const entries = [];
  if (it.type === 'folder') {
    entries.push({ icon:'⧉', label:'Abrir em Novas Abas', action: () => {
      const urls = allBookmarkUrls(it);
      if (!urls.length) return;
      if (urls.length > 10 && !confirm(`Abrir ${urls.length} abas de uma vez?`)) return;
      urls.forEach(u => window.open(u, '_blank'));
      if (urls.length > 1) setTimeout(() => alert('Se abriu só 1 aba, autorize pop-ups deste site no navegador.'), 400);
    }});
    entries.push({ sep: true });
    entries.push({ icon:'✏️', label:'Renomear', action: () => { modal = { mode:'rename', item: it }; render(); } });
    entries.push({ icon:'➡️', label:'Mover', action: () => ctxMoveMenu(x, y, it) });
    entries.push({ icon:'⿻', label:'Duplicar', action: () => duplicateItem(it.id) });
    entries.push({ icon:'↕', label:'A→Z', action: () => { sortListAZ(it.items || [], false); saveData(); render(); } });
    entries.push({ sep: true });
    entries.push({ icon:'🗑', label:'Apagar', danger:true, action: () => deleteItemById(it.id) });
  } else {
    entries.push({ icon:'⧉', label:'Abrir em Nova Aba', action: () => { if (it.url) window.open(it.url, '_blank'); } });
    entries.push({ sep: true });
    entries.push({ icon:'✏️', label:'Renomear', action: () => { modal = { mode:'rename', item: it }; render(); } });
    entries.push({ icon:'➡️', label:'Mover', action: () => ctxMoveMenu(x, y, it) });
    entries.push({ icon:'⿻', label:'Duplicar', action: () => duplicateItem(it.id) });
    entries.push({ icon:'🪄', label:'Ícone', action: () => {
      const a = autoIconUrl(it.url);
      if (a) { it.icon = a; saveData(); render(); }
    }});
    entries.push({ icon:'🔗', label:'Copiar Link', action: () => {
      navigator.clipboard?.writeText(it.url || '').then(() => showToast('Link copiado')).catch(()=>{});
    }});
    entries.push({ icon:'📤', label:'Compartilhar', action: async () => {
      try {
        if (navigator.share) await navigator.share({ title: it.name, url: it.url });
        else { await navigator.clipboard?.writeText(it.url || ''); alert('Link copiado — compartilhamento nativo indisponível neste navegador.'); }
      } catch {}                                 // usuário cancelou o share: silencioso
    }});
    entries.push({ sep: true });
    entries.push({ icon:'🗑', label:'Apagar', danger:true, action: () => deleteItemById(it.id) });
  }

}
function ctxMoveMenu(x, y, it){
  const entries = [{ icon:'‹', label:'Voltar', action: () => ctxMenuAgain(x, y, it) }, { sep: true }];
  entries.push({ icon:'⌂', label:'Página inicial', action: () => moveItem(it.id, '') });
  const fs = allFolders()
    .filter(f => f.id !== it.id && !(it.type === 'folder' && isDescendant(it.id, f.id)))
    .map(f => { const item = findItem(f.id); return { id: f.id, name: item.name, emoji: item.emoji || '📁' }; })
    .sort((a, b) => a.name.localeCompare(b.name, 'pt-BR', { sensitivity: 'base' }));
  for (const f of fs) entries.push({ icon: f.emoji, label: f.name, action: () => moveItem(it.id, f.id) });
  entries.push({ sep: true });
  entries.push({ icon:'➕', label:'Add Pasta e Mover', action: () => {
    const n = (prompt('Nome da nova pasta:') || '').trim();

    const nf = { id: genId(), type:'folder', emoji:'', name: n, items: [] };
    items.push(nf);

  }});

}
function ctxMenuAgain(x, y, it){               // reabre o menu principal do item

function ctxForBackground(x, y){

// ─── Render ───────────────────────────────────────────────────────────────────
function render() {
  const app = document.getElementById('app');
  const folder = currentFolder();
  let displayItems = currentList();

  if (searchQuery.trim()) {
    const q = normTxt(searchQuery.trim());
    const flat = [];
    (function walk(list, ctx){
      for (const it of list) {
        if (it.type === 'folder') walk(it.items || [], it.name);
        else if (normTxt(it.name).includes(q) || normTxt(it.url).includes(q))
          flat.push({ ...it, _inFolder: ctx });        // acha por nome (sem acento) ou domínio/URL
      }
    })(items, null);
    displayItems = flat;
  }

  const showTop = !searchQuery.trim() && !path.length && !editMode && !sortMode && !moveMode && !selectMode;
  const top = showTop ? topUsed() : [];

  app.innerHTML = [
    renderHeader(folder),
    searchOpen || searchQuery ? renderSearch() : '',
    top.length ? '<div class="top-used-title">⭐ Mais usados</div><div class="grid' + (viewMode === 'list' ? ' list-view' : '') + '">' +
                 top.map(item => renderTile(item)).join('') + '</div>' : '',
    '<div class="grid' + (viewMode === 'list' ? ' list-view' : '') + '" id="grid">',
    displayItems.map(item => renderTile(item)).join(''),
    !displayItems.length && !searchQuery.trim() && path.length && !editMode && !sortMode && !moveMode
      ? '<div class="empty-folder">📭 Esta pasta está vazia</div>' : '',
    '</div>',
    '<input type="file" id="import-html-file" accept=".html,.htm,text/html" style="display:none">',
    '<input type="file" id="import-file" accept=".json,application/json" style="display:none">',
    editMode && !searchQuery ? `<div class="hint">Toque no item para renomear · Arraste para reordenar</div>` : '',
    moveMode && !searchQuery ? `<div class="hint">Toque no item para escolher a pasta de destino</div>` : '',
    selectMode && !searchQuery ? `<div class="hint">Toque nos itens para selecionar</div>` : '',
    selectMode && !searchQuery ? renderSelBar() : '',
    sortMode && !searchQuery ? `<div class="hint">Arraste para reordenar · Concluído para sair</div>` : '',
    modal ? renderModal() : '',
  ].join('');

  attachEvents();
}

function exitSelect(){ selectMode = false; selectedIds = new Set(); }
function bulkMove(ids, destId){
  for (const id of ids) {
    const item = findItem(id); if (!item) continue;
    if (item.type === 'folder' && (id === destId || isDescendant(id, destId))) continue;
    const src = findParentList(id); if (!src) continue;
    src.splice(src.findIndex(i => i.id === id), 1);
    const dest = destId ? (findItem(destId)?.items) : items;
    (dest || items).push(item);
  }
  saveData(); render();
}
function bulkDelete(ids){
  const removed = [];                          // [{list, idx, it}] p/ Desfazer
  for (const id of ids) {
    const list = findParentList(id); if (!list) continue;
    const idx = list.findIndex(i => i.id === id); if (idx < 0) continue;
    removed.push({ list, idx, it: list[idx] });
    list.splice(idx, 1);
  }
  saveData(); render();
  showToast(`${removed.length} ${removed.length === 1 ? 'item apagado' : 'itens apagados'}`, {
    actionLabel: 'Desfazer', duration: 5000,
    onAction: () => {
      for (const r of removed.reverse()) r.list.splice(Math.min(r.idx, r.list.length), 0, r.it);
      saveData(); render();
    }
  });
}

function renderFolderPreview(folder) {
  const previews = (folder.items || []).slice(0, 4);
  if (!previews.length) return `<span class="folder-empty">📁</span>`;
  const cells = previews.map(sub => {
    if (sub.type === 'folder') return `<div class="mini-folder">${sub.emoji || '📁'}</div>`;
    const l = (sub.name||'?')[0].toUpperCase();
    if (sub.icon) return `<img draggable="false" src="${sub.icon.replace(/"/g,'&quot;')}" data-letter="${l}" onerror="miniImgErr(this)" alt="">`;
    const h = hostOf(sub.url);
    return h
      ? `<img draggable="false" src="${favSrc(sub.url)}" data-host="${h}" data-stage="0" data-letter="${l}" onload="imgLoaded(this)" onerror="miniImgErr(this)" alt="">`
      : `<div class="mini-fallback">${l}</div>`;
  }).join('');
  return `<div class="folder-preview">${cells}</div>`;
}

function renderFavicon(item) {
  const l = (item.name||'?')[0].toUpperCase();
  if (item.icon) return `<img class="tile-favicon" draggable="false" src="${item.icon.replace(/"/g,'&quot;')}" data-letter="${l}" onerror="tileImgErr(this)" alt="">`;
  const h = hostOf(item.url);
  return h
    ? `<img class="tile-favicon" draggable="false" src="${favSrc(item.url)}" data-host="${h}" data-stage="0" data-letter="${l}" onload="imgLoaded(this)" onerror="tileImgErr(this)" alt="">`
    : `<div class="tile-fallback">${l}</div>`;
}

// ─── Duplicados ──────────────────────────────────────────────────────
function dupKey(u){                                    // normaliza p/ comparação
  return (u || '').toLowerCase().replace(/^https?:\/\//, '').replace(/^www\./, '').replace(/\/+$/, '');
}
function showDuplicates(){
  const byUrl = new Map();                             // key → [{name, trilha}]
  (function walk(list, trail){
    for (const it of list) {
      if (it.type === 'folder') walk(it.items || [], trail.concat((it.emoji ? it.emoji + ' ' : '') + it.name));
      else {
        const k = dupKey(it.url); if (!k) continue;
        if (!byUrl.has(k)) byUrl.set(k, []);
        byUrl.get(k).push({ name: it.name, where: trail.length ? trail.join(' › ') : '⌂ Página inicial' });
      }
    }
  })(items, []);
  const dups = [...byUrl.entries()].filter(([, v]) => v.length > 1);

  document.getElementById('dup-overlay')?.remove();
  const ov = document.createElement('div');
  ov.id = 'dup-overlay'; ov.className = 'modal-overlay';
  const rows = dups.map(([url, list]) =>
    `<div class="dup-group">
       <div class="dup-url">${escHtml(url)}</div>
       ${list.map(e => `<div class="dup-entry">• ${escHtml(e.name)} — <span>${escHtml(e.where)}</span></div>`).join('')}
     </div>`).join('');
  ov.innerHTML = `<div class="modal-box">
    <div class="modal-title">♊ Duplicados${dups.length ? ` (${dups.length})` : ''}</div>
    ${dups.length ? rows : '<div class="dup-entry">Nenhuma URL repetida. ✓</div>'}
    <div class="modal-actions"><button class="modal-cancel" id="dup-close">Fechar</button></div>
  </div>`;
  ov.addEventListener('click', e => { if (e.target === ov || e.target.id === 'dup-close') ov.remove(); });
  document.body.appendChild(ov);
}

  document.getElementById('edit-btn')?.addEventListener('click', e => {

    if (editMode || sortMode || moveMode || selectMode) { setEditMode(false); sortMode = false; moveMode = false; exitSelect(); render(); return; }

  });

  });

    if (!selectedIds.size) { showToast('Nenhum item selecionado'); return; }
    modal = { mode: 'move-multi' }; render();
  });
  document.getElementById('sel-del')?.addEventListener('click', () => {
    if (!selectedIds.size) { showToast('Nenhum item selecionado'); return; }
    if (!confirm(`Excluir ${selectedIds.size} ${selectedIds.size === 1 ? 'item' : 'itens'}?`)) return;
    const ids = [...selectedIds];
    exitSelect();
    bulkDelete(ids);
  });
  document.getElementById('add-btn')?.addEventListener('click', e => {
    e.stopPropagation();
    if (document.getElementById('ctx-menu')) { closeCtx(); return; }   // 2º clique fecha
    const r = e.currentTarget.getBoundingClientRect();
    openCtx(Math.max(8, r.right - 185), r.bottom + 6, [
      { icon:'⭐️', label:'Favorito', action: () => { modal = { mode: 'add-bookmark' }; render(); } },
      { icon:'📂', label:'Pasta',    action: () => { modal = { mode: 'add-folder' }; render(); } },
    ], { title: '➕ Adicionar' });
  });
  document.getElementById('btn-auto-icon')?.addEventListener('click', () => {
    const u = document.getElementById('form-url')?.value;
    const root = rootDomain(hostOf(normalizeUrl(u)));
    if (!root) { alert('Preencha a URL primeiro.'); return; }
    const f = document.getElementById('form-icon');
    if (f) f.value = root;
  });
  document.getElementById('search-btn')?.addEventListener('click', () => {
    searchOpen = !searchOpen;
    if (!searchOpen) searchQuery = '';
    render();
    if (searchOpen) document.getElementById('search-input')?.focus();
  });
  document.getElementById('back-btn')?.addEventListener('click', () => {
    if (path.length) history.back();                   // popstate faz o pop + render
  });
  document.getElementById('search-input')?.addEventListener('input', e => {
    const pos = e.target.selectionStart;
    searchQuery = e.target.value; render();
    const inp = document.getElementById('search-input');
    if (inp) { inp.focus(); inp.setSelectionRange(pos, pos); }
  });

  // Importar (inputs de arquivo — acionados pelo menu)
  document.getElementById('import-html-file')?.addEventListener('change', e => {
    const file = e.target.files[0]; if (!file) return;
    const r = new FileReader();
    r.onload = () => { try { importHtmlText(r.result); } catch (err) { alert('Erro ao importar HTML: ' + err.message); } };
    r.readAsText(file);
    e.target.value = '';                        // permite reimportar o mesmo arquivo
  });
  document.getElementById('app')?.addEventListener('contextmenu', e => {
    if (!e.target.closest('.tile')) { e.preventDefault(); ctxForBackground(e.clientX, e.clientY); }
  });
  document.getElementById('import-file')?.addEventListener('change', e => {
    const file = e.target.files[0]; if (!file) return;
    const r = new FileReader();
    r.onload = () => {
      try {
        const parsed = JSON.parse(r.result);
        const data = Array.isArray(parsed) ? parsed : parsed.items;   // aceita backup ou array cru
        if (!Array.isArray(data) || !data.every(i => i && i.id && i.name !== undefined))
          throw new Error('estrutura inválida');
        if (!confirm('Substituir TODOS os favoritos atuais pelo backup (' + data.length + ' itens na raiz)?')) return;
        items = data; saveData(); render();
      } catch (err) {
        alert('Arquivo de backup inválido: ' + err.message);
      }
    };
    r.readAsText(file);
  });

  document.querySelectorAll('.tile:not(.add-tile)').forEach(tile => {
    tile.addEventListener('click', e => {
      if (lpFired) { lpFired = false; return; }          // ignora clique pós long-press
      if (e.target.classList.contains('delete-btn')) return;
      const id = tile.dataset.id, type = tile.dataset.type;
      if (editMode && !searchQuery) {          // modo renomear: só nome (e emoji de pasta)
        modal = { mode: 'rename', item: findItem(id) };
        render(); return;
      }
      if (moveMode && !searchQuery) {          // modo mover: só escolhe a pasta de destino
        modal = { mode: 'move', item: findItem(id) };
        render(); return;
      }
      if (selectMode && !searchQuery) {        // modo selecionar: alterna a marcação
        selectedIds.has(id) ? selectedIds.delete(id) : selectedIds.add(id);
        render(); return;
      }
      if (sortMode && !searchQuery) return;    // modo ordenar: só arrastar, toque é inerte
      if (type === 'folder') { navigateInto(id); }
      else { const u = tile.dataset.url; if (u) { bumpClick(id); window.location.href = u; } }   // conta o uso e abre na mesma aba
    });
    tile.addEventListener('contextmenu', e => { e.preventDefault(); e.stopPropagation(); ctxForTile(e.clientX, e.clientY, tile); });
    tile.querySelector('.delete-btn')?.addEventListener('click', e => {
      e.stopPropagation();
      deleteItemById(e.currentTarget.dataset.id);      // mesmo fluxo: toast + Desfazer
    });

  });

  document.querySelectorAll('.add-tile').forEach(tile => {
    tile.addEventListener('click', () => {
      modal = { mode: tile.dataset.add === 'folder' ? 'add-folder' : 'add-bookmark' };
      render();
      document.getElementById('form-name')?.focus();
    });
  });

  document.getElementById('modal-overlay')?.addEventListener('click', e => {
    if (e.target.id === 'modal-overlay') { modal = null; render(); }
  });
  document.getElementById('modal-cancel')?.addEventListener('click', () => { modal = null; render(); });
  document.getElementById('modal-confirm')?.addEventListener('click', submitModal);
  document.getElementById('modal-box')?.addEventListener('keydown', e => {
    if (e.key === 'Enter' && e.target.tagName !== 'SELECT') submitModal();
    if (e.key === 'Escape') { modal = null; render(); }
  });
}

// ─── Ações do modal ───────────────────────────────────────────────────────────
function submitModal() {
  if (modal.mode === 'move-multi') {           // mover vários de uma vez
    const destId = document.getElementById('form-folder')?.value || '';
    const ids = [...selectedIds];
    modal = null;
    exitSelect();
    bulkMove(ids, destId);
    showToast(`${ids.length} ${ids.length === 1 ? 'item movido' : 'itens movidos'}`);
    return;
  }
  if (modal.mode === 'move') {                 // só troca de pasta: sem campo nome
    const destId = document.getElementById('form-folder')?.value || '';
    const id = modal.item.id;
    modal = null;
    moveItem(id, destId);                      // moveItem salva + rerenderiza
    showToast('Movido');
    return;
  }
  const name = (document.getElementById('form-name')?.value || '').trim();
  if (!name) return;

  if (modal.mode === 'rename') {               // só nome (e emoji de pasta): nada de URL/pasta
    const it = modal.item;
    it.name = name;
    if (it.type === 'folder') it.emoji = (document.getElementById('form-emoji')?.value || '').trim();
    modal = null; saveData(); render();
    showToast('Renomeado');
    return;
  }
  const destId = document.getElementById('form-folder')?.value || '';
  const isFolder = modal.mode === 'add-folder' || (modal.mode === 'edit' && modal.item.type === 'folder');

  if (modal.mode === 'edit') {
    const it = modal.item;
    it.name = name;
    if (isFolder) it.emoji = (document.getElementById('form-emoji')?.value || '').trim();
    else {
      it.url = normalizeUrl(document.getElementById('form-url')?.value);
      it.icon = iconFieldToUrl(document.getElementById('form-icon')?.value);
      if (!it.icon) delete it.icon;
    }
    modal = null; saveData();
    moveItem(it.id, destId);                   // moveItem salva + rerenderiza
    showToast('Alterações salvas');
    return;
  }

  let novo;
  if (isFolder) {
    novo = { id: genId(), type:'folder',
             emoji: (document.getElementById('form-emoji')?.value || '').trim(), name, items: [] };
  } else {
    novo = { id: genId(), type:'bookmark', name,
             url: normalizeUrl(document.getElementById('form-url')?.value) };
    const ic = iconFieldToUrl(document.getElementById('form-icon')?.value);
    if (ic) novo.icon = ic;
  }
  const dest = destId ? findItem(destId)?.items : items;
  (dest || items).push(novo);
  modal = null; saveData(); render();
}

// ─── Atalhos de teclado (Mac/desktop) ─────────────────────────────────────────
addEventListener('keydown', e => {
  const inp = document.getElementById('search-input');
  const typing = /^(INPUT|SELECT|TEXTAREA)$/.test(document.activeElement?.tagName || '');

  if ((e.key === '/' && !typing) || ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k')) {
    e.preventDefault();
    if (!searchOpen) { searchOpen = true; render(); }    // "/" ou Cmd+K → abre e foca a busca
    document.getElementById('search-input')?.focus(); return;
  }
  if (e.key === 'Enter' && document.activeElement === inp && searchQuery.trim()) {
    const first = document.querySelector('#grid .tile[data-type="bookmark"]');
    const u = first?.dataset.url;
    if (u) { bumpClick(first.dataset.id); window.location.href = u; }   // Enter → 1º resultado
    return;
  }
  if (e.key === 'Escape') {                              // Esc → fecha/limpa/volta, nesta ordem
    if (modal) { modal = null; render(); return; }
    if (document.getElementById('dup-overlay')) { document.getElementById('dup-overlay').remove(); return; }
    if (document.getElementById('ctx-menu')) return;     // listener do ctx já cuida
    if (searchQuery || searchOpen) { searchQuery = ''; searchOpen = false; render(); return; }
    if (path.length) history.back();
  }
});

// ─── Init ─────────────────────────────────────────────────────────────────────
async function init(){
  applyTheme();                                        // tema manual antes do 1º render
  document.title = pageTitle();
  loadData(); render();                                // pinta rápido com o local
  initPointer();                                       // Pointer Events: menu + arraste
  history.replaceState({ p: '' }, '');                 // raiz = ponto de partida do voltar
  if ('serviceWorker' in navigator && location.protocol === 'https:')
    navigator.serviceWorker.register('sw.js').catch(()=>{});   // offline: cache-first
  checkTokenAge();
  if (!ghConfigured()) return;
  try {
    const remote = await ghLoad();
    if (remote) {                                      // remoto é a fonte da verdade
      items = Array.isArray(remote) ? remote : (remote.items || items);
      lsSet(DATA_KEY, JSON.stringify(items));
      syncState = 'ok'; lsSet('last-sync', String(Date.now())); render();
    } else {                                           // 1ª vez: cria data.json com o estado atual
      syncState = 'ok'; updateSyncUI(); schedulePush();
    }
  } catch (e) {
    syncState = 'offline'; updateSyncUI();             // lista local já está na tela: nada trava
    showOfflineBanner();
  }
}
function tokenExpiryInfo(){
  if (!getToken()) { alert('🔑 Nenhum token salvo.'); return; }
  const d = parseInt(lsGet(TOKEN_KEY + '-date') || '0');
  if (!d) { alert('🔑 Token sem data registrada.\nRefaça o fluxo Token para iniciar a contagem.'); return; }
  const exp  = new Date(d + 365 * 86400000);             // fine-grained PAT: máx. 1 ano
  const days = Math.ceil((exp - Date.now()) / 86400000);
  const fmt  = dt => dt.toLocaleDateString('pt-BR');
  alert(`🔑 Token salvo em: ${fmt(new Date(d))}\nValidade estimada (1 ano): ${fmt(exp)}\n` +
        (days > 0 ? `Faltam ~${days} dias.` : 'Provavelmente expirado — renove no GitHub.'));
}
function checkTokenAge(){
  if (!getToken()) return;
  const d = parseInt(lsGet(TOKEN_KEY + '-date') || '0');
  if (!d) { lsSet(TOKEN_KEY + '-date', String(Date.now())); return; }  // token antigo sem data: conta a partir de hoje
  const days = (Date.now() - d) / 86400000;
  if (days < 335) return;                              // avisa nos 30 dias finais do ano de validade
  const b = document.createElement('div');
  b.className = 'offline-banner';
  b.innerHTML = '<span>🔑 Token do GitHub vence em breve —</span>' +
    '<a href="https://github.com/settings/personal-access-tokens" target="_blank" rel="noopener" style="color:var(--accent);text-decoration:none;font-weight:600">renovar</a>' +
    '<button aria-label="fechar">✕</button>';
  b.querySelector('button').addEventListener('click', () => b.remove());
  document.body.appendChild(b);
}
init();
</script>
